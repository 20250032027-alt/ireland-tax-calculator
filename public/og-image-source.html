<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    width: 1200px; height: 630px; overflow: hidden;
    background: #070d1a;
    font-family: -apple-system, 'Segoe UI', sans-serif;
    position: relative;
  }
  .noise {
    position: absolute; inset: 0;
    background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='1'/%3E%3C/svg%3E");
    opacity: 0.025; pointer-events: none; z-index: 10;
  }
  .glow {
    position: absolute; top: -100px; right: -100px;
    width: 700px; height: 500px; border-radius: 50%;
    background: radial-gradient(ellipse, rgba(0,168,107,0.18) 0%, transparent 65%);
  }
  .glow2 {
    position: absolute; bottom: -80px; left: -80px;
    width: 500px; height: 400px; border-radius: 50%;
    background: radial-gradient(ellipse, rgba(59,130,246,0.1) 0%, transparent 65%);
  }
  .content {
    position: relative; z-index: 5;
    padding: 72px 80px;
    height: 100%;
    display: flex;
    flex-direction: column;
    justify-content: space-between;
  }
  .badge {
    display: inline-flex; align-items: center; gap: 8px;
    background: rgba(0,168,107,0.12); border: 1px solid rgba(0,168,107,0.25);
    color: #00d084; padding: 6px 14px; border-radius: 4px;
    font-size: 13px; font-weight: 600; letter-spacing: 0.06em; text-transform: uppercase;
    width: fit-content; margin-bottom: 28px;
  }
  .dot { width: 7px; height: 7px; border-radius: 50%; background: currentColor; }
  h1 {
    font-size: 72px; font-weight: 700; line-height: 1.0;
    letter-spacing: -0.04em; color: #eef2ff;
    margin-bottom: 20px;
  }
  h1 span { color: #00d084; }
  p {
    font-size: 22px; color: #8fa0c0; line-height: 1.5; max-width: 560px;
  }
  .stats {
    display: flex; gap: 48px;
  }
  .stat-value { font-size: 26px; font-weight: 700; color: #eef2ff; letter-spacing: -0.03em; }
  .stat-label { font-size: 12px; color: #4d607e; margin-top: 4px; letter-spacing: 0.04em; text-transform: uppercase; }
  .divider {
    width: 1px; background: rgba(255,255,255,0.06); align-self: stretch;
  }
  .brand { display: flex; align-items: center; gap: 10px; }
  .brand-icon {
    width: 36px; height: 36px; border-radius: 10px;
    background: #00a86b; display: flex; align-items: center; justify-content: center;
  }
  .brand-name { font-size: 15px; font-weight: 600; color: #eef2ff; }
  .brand-sub { font-size: 11px; color: #4d607e; margin-top: 2px; letter-spacing: 0.04em; }
</style>
</head>
<body>
<div class="noise"></div>
<div class="glow"></div>
<div class="glow2"></div>
<div class="content">
  <div>
    <div class="badge"><span class="dot"></span>Updated for Budget 2026</div>
    <h1>Irish Tax<br><span>Calculators</span></h1>
    <p>PAYE, USC, and PRSI calculated instantly. Based on Revenue.ie 2026 rates. Free.</p>
  </div>
  <div style="display:flex; justify-content:space-between; align-items:flex-end;">
    <div class="stats">
      <div>
        <div class="stat-value">12</div>
        <div class="stat-label">Free tools</div>
      </div>
      <div class="divider"></div>
      <div>
        <div class="stat-value">2026</div>
        <div class="stat-label">Tax year</div>
      </div>
      <div class="divider"></div>
      <div>
        <div class="stat-value">Revenue.ie</div>
        <div class="stat-label">Source</div>
      </div>
    </div>
    <div class="brand">
      <div class="brand-icon">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round">
          <rect x="4" y="2" width="16" height="20" rx="2"/><line x1="8" y1="10" x2="16" y2="10"/><line x1="8" y1="14" x2="16" y2="14"/><line x1="8" y1="18" x2="12" y2="18"/>
        </svg>
      </div>
      <div>
        <div class="brand-name">Ireland Tax Calculator</div>
        <div class="brand-sub">ireland-tax-calculator.vercel.app</div>
      </div>
    </div>
  </div>
</div>
</body>
</html>
